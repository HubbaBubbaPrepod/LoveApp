name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests & lint ─────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LoveAppServer/Backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spyuser
          POSTGRES_PASSWORD: "0451"
          POSTGRES_DB: loveapp_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LoveAppServer/Backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true   # non-blocking for now

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: spyuser
          PGPASSWORD: "0451"
          PGDATABASE: loveapp_db
          REDIS_URL: redis://localhost:6379
          API_PORT: 3005
          JWT_SECRET: f3ec2a4a90e8b74076b1f47037459900582bc89d0aa63d491b7dc7c71e765a53d13ea695625dd21cee704b8cd26ceffeceb18c821c1b03bfe6ead2b122a0ab44
          REFRESH_TOKEN_SECRET: c7e2d9f4a1b8e3c6d0f5a2b9e4c1d8f3a6b0e7c4d1f8a5b2e9c6d3f0a7b4e1c8d5f2a9b6e3c0d7f4a1b8e5c2d9f6a3b0e7c4d1f8a5b2e9c6
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_EXPIRES: 30d
          STORAGE_PATH: ./uploads
          MAX_FILE_SIZE: 20971520
          CORS_ORIGIN: "*"
          LOG_LEVEL: error
          LOGS_DIR: ./logs
          SERVER_URL: http://localhost:3005
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: your_email@gmail.com
          SMTP_PASSWORD: your_app_password
          GRAFANA_PASSWORD: admin

  # ── Android build ────────────────────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue --stacktrace --info

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Docker build (on push to main) ──────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: LoveAppServer/Backend
          push: false   # set to true + add registry credentials to deploy
          tags: loveapp-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
