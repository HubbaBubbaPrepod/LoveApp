version: '3.9'

services:
  api:
    build: .
    container_name: loveapp-api
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      # Override Redis URL to use Docker service name instead of localhost
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - loveapp_net

  redis:
    image: redis:7-alpine
    container_name: loveapp-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loveapp_net

  prometheus:
    image: prom/prometheus:latest
    container_name: loveapp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - loveapp_net

  grafana:
    image: grafana/grafana:latest
    container_name: loveapp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - loveapp_net
    depends_on:
      - prometheus

volumes:
  redis_data:
  uploads_data:
  logs_data:
  prometheus_data:
  grafana_data:

