version: '3.9'

services:
  api:
    build: .
    container_name: loveapp-api
    restart: unless-stopped
    # Port NOT exposed publicly — traffic goes through nginx only
    # ports:
    #   - "3005:3005"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - loveapp_net

  redis:
    image: redis:7-alpine
    container_name: loveapp-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    sysctls:
      net.core.somaxconn: 1024
    networks:
      - loveapp_net

  prometheus:
    image: prom/prometheus:latest
    container_name: loveapp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - loveapp_net

  grafana:
    image: grafana/grafana:latest
    container_name: loveapp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://love-app.ru:3000
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - loveapp_net
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: loveapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
      - "9000:9000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - uploads_data:/var/www/loveapp/uploads:ro
    depends_on:
      - api
      - frontend
    networks:
      - loveapp_net

  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
    container_name: loveapp-frontend
    restart: unless-stopped
    networks:
      - loveapp_net
    depends_on:
      - api

  portainer:
    image: portainer/portainer-ce:latest
    container_name: loveapp-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - loveapp_net

volumes:
  redis_data:
  uploads_data:
  logs_data:
  prometheus_data:
  grafana_data:
  portainer_data:

networks:
  loveapp_net:
    driver: bridge
