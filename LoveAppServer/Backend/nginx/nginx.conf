##############################################################################
# nginx.conf — LoveApp API reverse proxy  (love-app.ru)
##############################################################################

upstream loveapp_api {
    server api:3005;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect + Certbot challenge ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name love-app.ru www.love-app.ru;

    # Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://love-app.ru$request_uri;
    }
}

# ─── HTTPS server ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name love-app.ru www.love-app.ru;

    ssl_certificate     /etc/letsencrypt/live/love-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/love-app.ru/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY        always;
    add_header X-Content-Type-Options    nosniff     always;

    # ── Request limits ───────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── REST API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://loveapp_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Socket.IO (WebSocket upgrade required) ────────────────────────────
    location /socket.io/ {
        proxy_pass         http://loveapp_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static file uploads ──────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/loveapp/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Metrics — internal only ───────────────────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://loveapp_api/metrics;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://loveapp_api/api/health;
    }

    # ── Frontend (React SPA) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
# ─── Grafana — https://love-app.ru:3000 ──────────────────────────────────────
server {
    listen 3000 ssl http2;
    listen [::]:3000 ssl http2;
    server_name love-app.ru www.love-app.ru;

    ssl_certificate     /etc/letsencrypt/live/love-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/love-app.ru/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass         http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── Portainer — https://love-app.ru:9000 ────────────────────────────────────
server {
    listen 9000 ssl http2;
    listen [::]:9000 ssl http2;
    server_name love-app.ru www.love-app.ru;

    ssl_certificate     /etc/letsencrypt/live/love-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/love-app.ru/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass         http://portainer:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}