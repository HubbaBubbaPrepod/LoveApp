##############################################################################
# nginx.conf — LoveApp API reverse proxy
# Running on IP 195.2.71.218 without a domain — HTTP only.
# When you get a domain, uncomment the HTTPS block and add certbot.
##############################################################################

upstream loveapp_api {
    server 127.0.0.1:3005;
    keepalive 64;
}

# ─── HTTP server (no domain / no SSL) ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 195.2.71.218;

    # ── Request limits ───────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── REST API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://loveapp_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Socket.IO (WebSocket upgrade required) ────────────────────────────
    location /socket.io/ {
        proxy_pass         http://loveapp_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static file uploads ──────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/loveapp/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Metrics — internal only ───────────────────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://loveapp_api/metrics;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://loveapp_api/api/health;
    }
}

