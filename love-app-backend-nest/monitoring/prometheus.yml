global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'loveapp-api'
    static_configs:
      - targets: ['api:3005']
    metrics_path: '/metrics'

  # Uncomment if you add postgres-exporter / redis-exporter containers:
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
